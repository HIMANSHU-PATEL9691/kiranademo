<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Kirana — Inventory & Billing ERP for your kirana store" />
    <title>Smart Kirana</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>" />
    <!-- Prevent FOUC: apply saved theme before render -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && d)) document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Minimal loading skeleton to prevent blank flash -->
      <div id="app-loading" style="
        display:flex; align-items:center; justify-content:center;
        min-height:100vh; background:#f8fafc; font-family:system-ui,sans-serif;
        color:#64748b; font-size:14px; gap:8px;
      ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Loading Smart Kirana…
      </div>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
